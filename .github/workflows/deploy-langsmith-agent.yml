name: Deploy Agent to LangSmith

on:
  push:
    branches: [main]
    paths:
      - "js-langsmith/agent/**"
      - "js-langsmith/langgraph.json"
      - "js-langsmith/package.json"
      - "js-langsmith/pnpm-lock.yaml"
      - ".github/workflows/deploy-langsmith-agent.yml"
  workflow_dispatch:

concurrency:
  group: deploy-langsmith-agent
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js-langsmith
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: js-langsmith/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to LangSmith
        run: pnpm exec langgraphjs deploy --no-wait
        env:
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_DEPLOYMENT_NAME: ${{ vars.LANGSMITH_DEPLOYMENT_NAME }}
